---
# Claude Executor Workflow (Reusable)
#
# PURPOSE: Execution engine for Anthropic-model reviews. Runs anthropics/claude-code-action
# with either the direct Anthropic API or via AWS Bedrock (use_bedrock=true).
#
# WHY: This workflow contains the shared configuration and execution logic
# for all Anthropic-model Claude interactions. For non-Anthropic Bedrock models,
# see bedrock-generic-executor.yml.
#
# ROLE:
# - Sets up the execution environment (permissions, timeouts, runner)
# - Configures the anthropics/claude-code-action with configurable claude_args
# - Handles the actual Claude AI interaction
# - Gracefully skips when the Claude API is unavailable (5xx / network errors)
#   for the direct-API provider; the Bedrock path skips the health check
#
# USAGE: Called by claude-orchestrator.yml. Consumers shouldn't usually call
# this directly — go through the orchestrator so model routing happens.

name: Claude Executor (Reusable)

on:
  workflow_call:
    inputs:
      trigger_mode:
        description: 'Mode of trigger - interactive or automatic'
        required: true
        type: string
      prompt:
        description: 'Direct prompt for automatic reviews'
        required: false
        type: string
        default: ''
      claude_args:
        description: 'Claude CLI arguments (e.g. --allowedTools "Bash(git status),Bash(git diff)"). The model_id input is appended as --model automatically.'
        required: false
        type: string
        default: '--allowedTools "Bash(git status),Bash(git diff)"'
      timeout_minutes:
        description: 'Timeout in minutes for the Claude execution'
        required: false
        type: number
        default: 15
      runner:
        description: 'GitHub runner to use'
        required: false
        type: string
        default: 'ubuntu-latest'
      provider:
        description: 'Anthropic provider: "anthropic-api" (direct Anthropic API, default) or "anthropic-bedrock" (Bedrock via OIDC)'
        required: false
        type: string
        default: 'anthropic-api'
      model_id:
        description: 'Model ID. For anthropic-bedrock use the cross-region inference profile (e.g. global.anthropic.claude-sonnet-4-6). Empty means the action uses its default.'
        required: false
        type: string
        default: ''
      bedrock_role_arn:
        description: 'IAM role ARN to assume via OIDC when provider=anthropic-bedrock'
        required: false
        type: string
        default: ''
      aws_region:
        description: 'AWS region for Bedrock when provider=anthropic-bedrock'
        required: false
        type: string
        default: 'us-east-1'
    secrets:
      ANTHROPIC_API_KEY:
        description: 'Anthropic API key — required when provider=anthropic-api, ignored otherwise'
        required: false

jobs:
  claude:
    runs-on: ${{ inputs.runner }}
    timeout-minutes: ${{ inputs.timeout_minutes }}
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Validate inputs
        run: |
          set -euo pipefail
          PROVIDER="${{ inputs.provider }}"
          case "${PROVIDER}" in
            anthropic-api)
              if [ -z "${{ secrets.ANTHROPIC_API_KEY }}" ]; then
                echo "::error::provider=anthropic-api requires the ANTHROPIC_API_KEY secret"
                exit 1
              fi
              ;;
            anthropic-bedrock)
              if [ -z "${{ inputs.bedrock_role_arn }}" ]; then
                echo "::error::provider=anthropic-bedrock requires the bedrock_role_arn input"
                exit 1
              fi
              ;;
            *)
              echo "::error::unknown provider: ${PROVIDER}"
              exit 1
              ;;
          esac

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Configure AWS credentials (OIDC)
        if: inputs.provider == 'anthropic-bedrock'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ inputs.bedrock_role_arn }}
          aws-region: ${{ inputs.aws_region }}

      # Pre-flight check (anthropic-api path only): verify the Claude API is reachable
      # before attempting execution. Treats 5xx responses and network failures as
      # "unavailable" and skips gracefully. Auth errors (401/403) and rate limits (429)
      # still proceed so the action can surface them.
      - name: Check Claude API availability
        id: api-check
        if: inputs.provider == 'anthropic-api'
        run: |
          echo "Checking Claude API availability..."
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 15 \
            --retry 2 \
            --retry-delay 3 \
            -H "x-api-key: ${{ secrets.ANTHROPIC_API_KEY }}" \
            -H "anthropic-version: 2023-06-01" \
            "https://api.anthropic.com/v1/models" 2>/dev/null) || HTTP_CODE="000"

          echo "API response code: $HTTP_CODE"

          case "$HTTP_CODE" in
            200)
              echo "available=true" >> "$GITHUB_OUTPUT"
              echo "✅ Claude API is available"
              ;;
            500|503|529|000)
              echo "available=false" >> "$GITHUB_OUTPUT"
              echo "::warning::Claude AI service is unavailable (HTTP $HTTP_CODE). Skipping Claude Code step. Check https://status.anthropic.com"
              ;;
            *)
              # For auth errors (401/403), rate limits (429), or unexpected codes:
              # proceed and let the action report the specific error.
              echo "available=true" >> "$GITHUB_OUTPUT"
              echo "HTTP $HTTP_CODE received — proceeding with Claude execution"
              ;;
          esac

      - name: Compose claude_args with model
        id: args
        run: |
          set -euo pipefail
          # The action does NOT accept `model:` as an input — model must be in claude_args.
          # We prepend --model so consumer-supplied claude_args can override it if needed.
          BASE_ARGS="${{ inputs.claude_args }}"
          MODEL_ID="${{ inputs.model_id }}"
          if [ -n "${MODEL_ID}" ]; then
            COMPOSED=$(printf -- "--model %s\n%s" "${MODEL_ID}" "${BASE_ARGS}")
          else
            COMPOSED="${BASE_ARGS}"
          fi
          {
            echo "composed<<__EOF__"
            echo "${COMPOSED}"
            echo "__EOF__"
          } >> "$GITHUB_OUTPUT"

      - name: Run Claude Code (Anthropic API)
        id: claude-api
        if: inputs.provider == 'anthropic-api' && steps.api-check.outputs.available == 'true'
        continue-on-error: true
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: ${{ inputs.prompt }}
          claude_args: ${{ steps.args.outputs.composed }}
          use_sticky_comment: "true"
          track_progress: "true"

      - name: Run Claude Code (Bedrock)
        id: claude-bedrock
        if: inputs.provider == 'anthropic-bedrock'
        continue-on-error: true
        uses: anthropics/claude-code-action@v1
        with:
          use_bedrock: "true"
          prompt: ${{ inputs.prompt }}
          claude_args: ${{ steps.args.outputs.composed }}
          use_sticky_comment: "true"
          track_progress: "true"
        env:
          AWS_REGION: ${{ inputs.aws_region }}

      # If the Claude API step failed at runtime, re-check the API to determine whether
      # the failure was caused by service degradation (skip gracefully) or a real error
      # (fail the job so the team is alerted). Bedrock path doesn't have a health check.
      - name: Handle Claude execution result (anthropic-api)
        if: inputs.provider == 'anthropic-api' && steps.api-check.outputs.available == 'true' && steps.claude-api.outcome == 'failure'
        run: |
          echo "Claude Code step failed. Checking if this is due to service unavailability..."
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 10 \
            -H "x-api-key: ${{ secrets.ANTHROPIC_API_KEY }}" \
            -H "anthropic-version: 2023-06-01" \
            "https://api.anthropic.com/v1/models" 2>/dev/null) || HTTP_CODE="000"

          echo "Post-execution API check: HTTP $HTTP_CODE"

          case "$HTTP_CODE" in
            200)
              echo "::error::Claude Code step failed and the API is currently reachable — this appears to be a legitimate error. Review the logs above."
              exit 1
              ;;
            *)
              echo "::warning::Claude Code step failed due to API service degradation (HTTP $HTTP_CODE). Skipping gracefully."
              echo "For current service status, visit: https://status.anthropic.com"
              ;;
          esac

      - name: Handle Claude execution result (anthropic-bedrock)
        if: inputs.provider == 'anthropic-bedrock' && steps.claude-bedrock.outcome == 'failure'
        run: |
          echo "::error::Claude Code (Bedrock) step failed — review the logs above."
          exit 1

      - name: Claude service unavailable — step skipped
        if: inputs.provider == 'anthropic-api' && steps.api-check.outputs.available != 'true'
        run: |
          echo "::warning::Claude AI Orchestrator was skipped because the Claude API is currently unavailable."
          echo "The pipeline continues normally. Claude review will run on the next PR push when the service is restored."
          echo ""
          echo "For current service status, visit: https://status.anthropic.com"
