---
# Claude Orchestrator Workflow (Reusable)
#
# PURPOSE: This workflow orchestrates Claude AI interactions across multiple
# model providers. Routes by model_id to the appropriate executor:
#
#   - Empty model_id or *.anthropic.* (any inference profile)
#       -> claude-executor.yml (existing Anthropic path; API or Bedrock)
#   - Any other model_id (us.amazon.*, meta.*, mistral.*, cohere.*, ai21.*, ...)
#       -> bedrock-generic-executor.yml (Bedrock Converse API + sticky comments)
#
# Exactly one executor runs per call — the route job emits a provider output
# and each executor job gates on it.
#
# ARCHITECTURE: Consumer repositories handle their own webhook events and
# conditional logic, then call this workflow with the appropriate trigger
# mode and model configuration.
#
# USAGE: This is a reusable workflow that can be called from any repository
# with repository-specific configurations. See CLAUDE.md for examples.

name: Claude Orchestrator (Reusable)

on:
  workflow_call:
    inputs:
      trigger_mode:
        description: 'Trigger mode: interactive or automatic'
        required: true
        type: string
      prompt:
        description: 'Direct prompt for automatic mode'
        required: false
        type: string
      claude_args:
        description: 'Claude CLI arguments (e.g. --allowedTools "Bash(git status),Bash(git diff)") — applies to the Anthropic path only'
        required: false
        type: string
        default: '--allowedTools "Bash(git status),Bash(git diff)"'
      timeout_minutes:
        description: 'Timeout in minutes for executor execution'
        required: false
        type: number
        default: 15
      runner:
        description: 'GitHub runner to use'
        required: false
        type: string
        default: 'ubuntu-latest'
      enable_mention_detection:
        description: 'Enable automatic @claude mention detection for interactive mode'
        required: false
        type: boolean
        default: true
      skip_automatic_when_mentioned:
        description: 'Skip automatic mode when PR title/body contains @claude mention'
        required: false
        type: boolean
        default: true
      custom_trigger_condition:
        description: 'Custom condition to override default mention detection (optional)'
        required: false
        type: string
      # --- Multi-model inputs (v3) ---
      model_id:
        description: 'Bedrock model ID, inference-profile form (e.g. global.anthropic.claude-sonnet-4-6, us.amazon.nova-pro-v1:0). Empty = direct Anthropic API.'
        required: false
        type: string
        default: ''
      bedrock_role_arn:
        description: 'IAM role ARN that GitHub Actions assumes via OIDC to call Bedrock. Required when model_id is set.'
        required: false
        type: string
        default: ''
      aws_region:
        description: 'AWS region for Bedrock calls'
        required: false
        type: string
        default: 'us-east-1'
      sticky_namespace:
        description: 'Namespace for the sticky-comment marker on the bedrock-generic path (defaults to model family). Has no effect on the Anthropic path.'
        required: false
        type: string
        default: ''
      use_sticky_comment:
        description: 'Reuse one auto-updating comment per PR (true, default). Set false to post a fresh comment on every run, preserving the full feedback->change->feedback history for reviewers.'
        required: false
        type: boolean
        default: true
      reasoning_effort:
        description: 'Reasoning effort for the OpenAI/Codex (mantle) path: minimal | low | medium | high. Ignored on other paths.'
        required: false
        type: string
        default: 'medium'
      max_output_tokens:
        description: 'Max output-token budget for the bedrock-generic and OpenAI/Codex paths. For reasoning models this budget also covers reasoning tokens. Ignored on the Anthropic path (it manages its own budget).'
        required: false
        type: number
        default: 32000
    secrets:
      ANTHROPIC_API_KEY:
        description: 'Anthropic API key — required only when using the direct Anthropic API path (model_id empty)'
        required: false

jobs:
  route:
    # Preserve the existing mention-detection / automatic-mode gating logic.
    # When this job is skipped, both downstream executor jobs are also skipped.
    if: |
      inputs.custom_trigger_condition != '' || (
        inputs.enable_mention_detection == true && inputs.trigger_mode == 'interactive' && (
          (github.event_name == 'issue_comment' && (
            contains(github.event.comment.body, '@claude') ||
            contains(github.event.comment.body, '@Claude') ||
            contains(github.event.comment.body, '@CLAUDE')
          )) ||
          (github.event_name == 'pull_request_review_comment' && (
            contains(github.event.comment.body, '@claude') ||
            contains(github.event.comment.body, '@Claude') ||
            contains(github.event.comment.body, '@CLAUDE')
          )) ||
          (github.event_name == 'pull_request_review' && (
            contains(github.event.review.body, '@claude') ||
            contains(github.event.review.body, '@Claude') ||
            contains(github.event.review.body, '@CLAUDE')
          )) ||
          (github.event_name == 'issues' && (
            contains(github.event.issue.body, '@claude') ||
            contains(github.event.issue.body, '@Claude') ||
            contains(github.event.issue.body, '@CLAUDE') ||
            contains(github.event.issue.title, '@claude') ||
            contains(github.event.issue.title, '@Claude') ||
            contains(github.event.issue.title, '@CLAUDE')
          )) ||
          (github.event_name == 'pull_request' && (
            contains(github.event.pull_request.title, '@claude') ||
            contains(github.event.pull_request.title, '@Claude') ||
            contains(github.event.pull_request.title, '@CLAUDE') ||
            contains(github.event.pull_request.body, '@claude') ||
            contains(github.event.pull_request.body, '@Claude') ||
            contains(github.event.pull_request.body, '@CLAUDE')
          ))
        )
      ) || (
        inputs.trigger_mode == 'automatic' && (
          inputs.skip_automatic_when_mentioned == false || (
            github.event_name != 'pull_request' || (
              !contains(github.event.pull_request.title, '@claude') &&
              !contains(github.event.pull_request.title, '@Claude') &&
              !contains(github.event.pull_request.title, '@CLAUDE') &&
              !contains(github.event.pull_request.body, '@claude') &&
              !contains(github.event.pull_request.body, '@Claude') &&
              !contains(github.event.pull_request.body, '@CLAUDE')
            )
          )
        )
      )
    runs-on: ubuntu-latest
    outputs:
      provider: ${{ steps.detect.outputs.provider }}
      prompt: ${{ steps.detect.outputs.prompt }}
    steps:
      - id: detect
        env:
          MODEL_ID: ${{ inputs.model_id }}
          BEDROCK_ROLE_ARN: ${{ inputs.bedrock_role_arn }}
          TRIGGER_MODE: ${{ inputs.trigger_mode }}
          INPUT_PROMPT: ${{ inputs.prompt }}
          # Org-wide default automatic-review prompt. A consumer's `prompt` input
          # overrides this; interactive (@claude) runs leave it empty so the mention
          # response isn't hijacked. Mirrors dotCMS/core .github/prompts/gpt-auto-review.md.
          DEFAULT_PROMPT: |
            You are reviewing a pull request for **dotCMS**, a Java/Angular headless CMS platform (Java 25 + Maven backend, Angular 19 + Nx frontend).

            Review only what's in the diff. Be direct and specific — include file and line for every finding. Skip praise, summaries, and style nitpicks. Do not invent issues.

            **Only flag bugs introduced by this PR.** Do not flag pre-existing issues in unchanged code.

            Check for:
            1. **Bugs** — logic errors, null dereferences, off-by-one, missing edge cases, race conditions
            2. **Security** — SQL injection (`DotConnect + addParam()` required, never string concat), missing permission checks (`hasPermission` / `DotSecurityException`), sensitive data in logs, hardcoded secrets, unvalidated input in file paths or system calls
            3. **dotCMS conventions** — `Config.getStringProperty()` not `System.getProperty/getenv`; `Logger` not `System.out`; `APILocator`/`FactoryLocator` for service access; `@WrapInTransaction` on multi-step DB writes; add dependency versions to `bom/application/pom.xml` only (never `dotCMS/pom.xml`)
            4. **Design** — wrong layer of concern, broken abstraction, unnecessary complexity
            5. **Test gaps** — meaningful new behavior with no test coverage
            6. **Error paths** — for each external call or state mutation in the diff, what actually happens when it fails? Is the failure caught, logged, surfaced, or silently swallowed?
            7. **Replay safety** — if this exact code runs twice (retry, double-click, redelivered queue message), does it double-charge, double-write, or corrupt state? New writes without idempotency guards are suspect.
            8. **Blast radius** — when this breaks, what breaks with it? Flag code paths where a single failure cascades to unrelated services, callers, or data.
            9. **Missing code** — the hardest check: what should be here but isn't? No timeout. No rollback. No cancellation. No error handler. No test for the failure case. Half the bugs are a correct line that was never written, not a wrong line that was.

            **Non-speculative rule:** Only flag what you can prove from the diff and repository code. Do not flag based on assumptions about external systems, undocumented APIs, or behaviors you cannot verify. If a concern depends on uncertainty, include it as 🟡 Medium with explicit "Assumption:" and "What to verify:" lines — do not escalate its severity.

            ## Output format

            Respond with raw GitHub-flavored markdown directly in your reply. Do **not** wrap the whole response in a code block or triple backticks — the sections below are the literal output, not an example to fence. Use this exact structure (omit a section entirely if it has no entries):

            #### New Issues
            - 🔴 Critical: `path/file:line` — what's wrong and why it matters
            - 🟠 High: `path/file:line` — what's wrong and why it matters
            - 🟡 Medium: `path/file:line` — what's wrong and why it matters

            #### Existing
            - 🟡 Medium: `path/file:line` — prior finding still present (unchanged or incomplete fix)

            #### Resolved
            - ✅ `path/file:line` — brief reason it's now fixed or no longer applicable

            If the PR is clean with no prior findings, write: `No issues found.`

            **Severity gating:**
            - 🔴 Critical / 🟠 High: blocking — must be fixed before merge
            - 🟡 Medium: non-blocking — worth fixing but does not block merge

            At the very end of your response, on its own line, append this machine-data block (invisible in GitHub UI — used by the next run to carry findings forward):

            `<!-- dotcms-review-findings:[{"sev":"🔴 Critical","loc":"path/file:line","desc":"one sentence, no internal quotes"},...] -->`

            Rules for the machine-data line:
            - Always present — use `<!-- dotcms-review-findings:[] -->` when there are no findings
            - One line, no newlines inside the JSON
            - Include ALL open findings — new and existing (not resolved ones)

            ## If a "Prior review findings" section is present

            A `## Prior review findings (recheck these)` section may appear at the end of this prompt. If it does:

            1. Check the diff for **new** issues not in the prior list → **New Issues** section
            2. **Recheck each prior finding** against the current diff:
               - Still present → **Existing** section
               - Fixed or no longer applicable → **Resolved** section
        run: |
          set -euo pipefail
          if [ -z "${MODEL_ID}" ]; then
            # No model specified → direct Anthropic API. Bedrock role not required.
            PROVIDER="anthropic-api"
          # Anchored match: bare anthropic.* or inference-profile-prefixed
          # <region>.anthropic.* (us.anthropic.*, global.anthropic.*, eu.anthropic.*).
          # Avoids false matches on third-party model IDs that contain "anthropic." as substring.
          elif [[ "${MODEL_ID}" =~ ^([a-z]+\.)?anthropic\. ]]; then
            PROVIDER="anthropic-bedrock"
          # OpenAI GPT/Codex (openai.gpt-5.5, openai.gpt-5.4). Served only by bedrock-mantle
          # (OpenAI Responses API), not bedrock-runtime — routed to the codex executor.
          # Anchored like the anthropic match so "openai." as a substring can't misroute.
          elif [[ "${MODEL_ID}" =~ ^([a-z]+\.)?openai\. ]]; then
            PROVIDER="openai-mantle"
          else
            PROVIDER="bedrock-generic"
          fi

          # Validate bedrock_role_arn is present whenever we route to a Bedrock path.
          if [ "${PROVIDER}" != "anthropic-api" ] && [ -z "${BEDROCK_ROLE_ARN}" ]; then
            echo "::error::model_id=${MODEL_ID} requires bedrock_role_arn input"
            exit 1
          fi

          echo "Resolved provider: ${PROVIDER}"
          echo "provider=${PROVIDER}" >> "$GITHUB_OUTPUT"

          # Resolve effective prompt: consumer input wins; otherwise apply the org-wide
          # default for automatic reviews only (interactive @claude runs stay empty).
          if [ -n "${INPUT_PROMPT}" ]; then
            EFFECTIVE_PROMPT="${INPUT_PROMPT}"
          elif [ "${TRIGGER_MODE}" = "automatic" ]; then
            EFFECTIVE_PROMPT="${DEFAULT_PROMPT}"
          else
            EFFECTIVE_PROMPT=""
          fi
          {
            echo "prompt<<__PROMPT_EOF__"
            printf '%s\n' "${EFFECTIVE_PROMPT}"
            echo "__PROMPT_EOF__"
          } >> "$GITHUB_OUTPUT"

  claude-anthropic:
    needs: route
    # Fires for anthropic-api OR anthropic-bedrock. When route is skipped, this is too.
    if: needs.route.outputs.provider == 'anthropic-api' || needs.route.outputs.provider == 'anthropic-bedrock'
    uses: ./.github/workflows/claude-executor.yml
    with:
      trigger_mode: ${{ inputs.trigger_mode }}
      prompt: ${{ needs.route.outputs.prompt }}
      claude_args: ${{ inputs.claude_args }}
      timeout_minutes: ${{ inputs.timeout_minutes }}
      runner: ${{ inputs.runner }}
      provider: ${{ needs.route.outputs.provider }}
      model_id: ${{ inputs.model_id }}
      bedrock_role_arn: ${{ inputs.bedrock_role_arn }}
      aws_region: ${{ inputs.aws_region }}
      use_sticky_comment: ${{ inputs.use_sticky_comment }}
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

  bedrock-generic:
    needs: route
    if: needs.route.outputs.provider == 'bedrock-generic'
    uses: ./.github/workflows/bedrock-generic-executor.yml
    with:
      model_id: ${{ inputs.model_id }}
      bedrock_role_arn: ${{ inputs.bedrock_role_arn }}
      aws_region: ${{ inputs.aws_region }}
      prompt: ${{ needs.route.outputs.prompt }}
      sticky_namespace: ${{ inputs.sticky_namespace }}
      use_sticky_comment: ${{ inputs.use_sticky_comment }}
      max_output_tokens: ${{ inputs.max_output_tokens }}
      timeout_minutes: ${{ inputs.timeout_minutes }}
      runner: ${{ inputs.runner }}

  codex-mantle:
    needs: route
    if: needs.route.outputs.provider == 'openai-mantle'
    uses: ./.github/workflows/codex-executor.yml
    with:
      model_id: ${{ inputs.model_id }}
      bedrock_role_arn: ${{ inputs.bedrock_role_arn }}
      # aws_region defaults to us-east-1, where GPT-5.5/5.4 are served (also us-east-2;
      # GPT-5.4 also us-west-2). Consumers only set model_id.
      aws_region: ${{ inputs.aws_region }}
      prompt: ${{ needs.route.outputs.prompt }}
      sticky_namespace: ${{ inputs.sticky_namespace }}
      use_sticky_comment: ${{ inputs.use_sticky_comment }}
      reasoning_effort: ${{ inputs.reasoning_effort }}
      max_output_tokens: ${{ inputs.max_output_tokens }}
      timeout_minutes: ${{ inputs.timeout_minutes }}
      runner: ${{ inputs.runner }}
