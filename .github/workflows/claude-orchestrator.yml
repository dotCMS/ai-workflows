---
# Claude Orchestrator Workflow (Reusable)
#
# PURPOSE: This workflow orchestrates Claude AI interactions across multiple
# model providers. Routes by model_id to the appropriate executor:
#
#   - Empty model_id or *.anthropic.* (any inference profile)
#       -> claude-executor.yml (existing Anthropic path; API or Bedrock)
#   - Any other model_id (us.amazon.*, meta.*, mistral.*, cohere.*, ai21.*, ...)
#       -> bedrock-generic-executor.yml (Bedrock Converse API + sticky comments)
#
# model_id accepts a comma-separated list; each model reviews the PR independently.
# The route job sorts the models into one JSON list per executor, and each executor
# job fans out over its list via strategy.matrix (skipped when its list is empty).
#
# ARCHITECTURE: Consumer repositories handle their own webhook events and
# conditional logic, then call this workflow with the appropriate trigger
# mode and model configuration.
#
# USAGE: This is a reusable workflow that can be called from any repository
# with repository-specific configurations. See CLAUDE.md for examples.

name: Claude Orchestrator (Reusable)

on:
  workflow_call:
    inputs:
      trigger_mode:
        description: 'Trigger mode: interactive or automatic'
        required: true
        type: string
      prompt:
        description: 'Direct prompt for automatic mode'
        required: false
        type: string
      claude_args:
        description: 'Claude CLI arguments (e.g. --allowedTools "Bash(git status),Bash(git diff)") — applies to the Anthropic path only'
        required: false
        type: string
        default: '--allowedTools "Bash(git status),Bash(git diff)"'
      timeout_minutes:
        description: 'Timeout in minutes for executor execution'
        required: false
        type: number
        default: 15
      runner:
        description: 'GitHub runner to use'
        required: false
        type: string
        default: 'ubuntu-latest'
      enable_mention_detection:
        description: 'Enable automatic @claude mention detection for interactive mode'
        required: false
        type: boolean
        default: true
      skip_automatic_when_mentioned:
        description: 'Skip automatic mode when PR title/body contains @claude mention'
        required: false
        type: boolean
        default: true
      custom_trigger_condition:
        description: 'Custom condition to override default mention detection (optional)'
        required: false
        type: string
      # --- Multi-model inputs (v3) ---
      model_id:
        description: 'One or more Bedrock model IDs, comma-separated, inference-profile form (e.g. "global.anthropic.claude-sonnet-4-6, us.amazon.nova-pro-v1:0"). Each model reviews the PR independently. Empty = direct Anthropic API. With multiple models, leave sticky_namespace empty so each model keeps its own comment (markers key on model_id).'
        required: false
        type: string
        default: ''
      bedrock_role_arn:
        description: 'IAM role ARN that GitHub Actions assumes via OIDC to call Bedrock. Required when model_id is set.'
        required: false
        type: string
        default: ''
      aws_region:
        description: 'AWS region for Bedrock calls'
        required: false
        type: string
        default: 'us-east-1'
      sticky_namespace:
        description: 'Namespace for the sticky-comment marker on the bedrock-generic path (defaults to model family). Has no effect on the Anthropic path.'
        required: false
        type: string
        default: ''
      use_sticky_comment:
        description: 'Reuse one auto-updating comment per PR (true, default). Set false to post a fresh comment on every run, preserving the full feedback->change->feedback history for reviewers.'
        required: false
        type: boolean
        default: true
      reasoning_effort:
        description: 'Reasoning effort for the OpenAI/Codex (mantle) path: minimal | low | medium | high. Ignored on other paths.'
        required: false
        type: string
        default: 'medium'
      max_output_tokens:
        description: 'Max output-token budget for the bedrock-generic and OpenAI/Codex paths. For reasoning models this budget also covers reasoning tokens. Ignored on the Anthropic path (it manages its own budget).'
        required: false
        type: number
        default: 32000
      agentic:
        description: 'On the generic Bedrock-Converse path, route to the agentic harness executor (model can read the repo via tools, posts inline comments, can gate on severity) instead of the single-shot diff reviewer. No effect on the Anthropic or OpenAI/Codex paths.'
        required: false
        type: boolean
        default: false
      block_severities:
        description: 'Agentic harness only: comma-separated severities that FAIL the check when present (e.g. "critical,high"). "none" = advisory.'
        required: false
        type: string
        default: 'critical,high'
      model_prices:
        description: 'Agentic harness only: optional JSON overriding the built-in per-model price table (USD per 1M tokens) for the estimated-cost footer. e.g. {"qwen.qwen3-next-80b-a3b":{"in":0.40,"out":1.60}}.'
        required: false
        type: string
        default: ''
    secrets:
      ANTHROPIC_API_KEY:
        description: 'Anthropic API key — required only when using the direct Anthropic API path (model_id empty)'
        required: false

jobs:
  route:
    # Preserve the existing mention-detection / automatic-mode gating logic.
    # When this job is skipped, both downstream executor jobs are also skipped.
    if: |
      inputs.custom_trigger_condition != '' || (
        inputs.enable_mention_detection == true && inputs.trigger_mode == 'interactive' && (
          (github.event_name == 'issue_comment' && (
            contains(github.event.comment.body, '@claude') ||
            contains(github.event.comment.body, '@Claude') ||
            contains(github.event.comment.body, '@CLAUDE')
          )) ||
          (github.event_name == 'pull_request_review_comment' && (
            contains(github.event.comment.body, '@claude') ||
            contains(github.event.comment.body, '@Claude') ||
            contains(github.event.comment.body, '@CLAUDE')
          )) ||
          (github.event_name == 'pull_request_review' && (
            contains(github.event.review.body, '@claude') ||
            contains(github.event.review.body, '@Claude') ||
            contains(github.event.review.body, '@CLAUDE')
          )) ||
          (github.event_name == 'issues' && (
            contains(github.event.issue.body, '@claude') ||
            contains(github.event.issue.body, '@Claude') ||
            contains(github.event.issue.body, '@CLAUDE') ||
            contains(github.event.issue.title, '@claude') ||
            contains(github.event.issue.title, '@Claude') ||
            contains(github.event.issue.title, '@CLAUDE')
          )) ||
          (github.event_name == 'pull_request' && (
            contains(github.event.pull_request.title, '@claude') ||
            contains(github.event.pull_request.title, '@Claude') ||
            contains(github.event.pull_request.title, '@CLAUDE') ||
            contains(github.event.pull_request.body, '@claude') ||
            contains(github.event.pull_request.body, '@Claude') ||
            contains(github.event.pull_request.body, '@CLAUDE')
          ))
        )
      ) || (
        inputs.trigger_mode == 'automatic' && (
          inputs.skip_automatic_when_mentioned == false || (
            github.event_name != 'pull_request' || (
              !contains(github.event.pull_request.title, '@claude') &&
              !contains(github.event.pull_request.title, '@Claude') &&
              !contains(github.event.pull_request.title, '@CLAUDE') &&
              !contains(github.event.pull_request.body, '@claude') &&
              !contains(github.event.pull_request.body, '@Claude') &&
              !contains(github.event.pull_request.body, '@CLAUDE')
            )
          )
        )
      )
    runs-on: ubuntu-latest
    outputs:
      # One JSON array per executor — each entry is a model that routes there.
      # An executor job runs once per entry via strategy.matrix (or is skipped when '[]').
      anthropic: ${{ steps.detect.outputs.anthropic }}
      generic: ${{ steps.detect.outputs.generic }}
      harness: ${{ steps.detect.outputs.harness }}
      codex: ${{ steps.detect.outputs.codex }}
    steps:
      - id: detect
        env:
          MODEL_ID: ${{ inputs.model_id }}
          BEDROCK_ROLE_ARN: ${{ inputs.bedrock_role_arn }}
          AGENTIC: ${{ inputs.agentic }}
        run: |
          python3 - <<'PY'
          import json, os, re, sys

          raw = os.environ.get("MODEL_ID", "")
          role = os.environ.get("BEDROCK_ROLE_ARN", "")
          agentic = os.environ.get("AGENTIC", "") == "true"

          # Split the comma-separated list; drop blanks. Empty list = single direct Anthropic API run.
          models = [m.strip() for m in raw.split(",") if m.strip()]
          if not models:
              models = [""]

          anthropic, generic, harness, codex = [], [], [], []
          for m in models:
              if m == "":
                  # No model → direct Anthropic API. Bedrock role not required.
                  anthropic.append({"model_id": "", "provider": "anthropic-api"})
              # Anchored match: bare anthropic.* or inference-profile-prefixed <region>.anthropic.*
              # (us./global./eu.). Avoids false matches on IDs that merely contain "anthropic.".
              elif re.match(r"^([a-z]+\.)?anthropic\.", m):
                  anthropic.append({"model_id": m, "provider": "anthropic-bedrock"})
              # OpenAI GPT/Codex — served only by bedrock-mantle, routed to the codex executor.
              elif re.match(r"^([a-z]+\.)?openai\.", m):
                  codex.append(m)
              # Everything else → generic Bedrock Converse, or its agentic harness upgrade.
              elif agentic:
                  harness.append(m)
              else:
                  generic.append(m)

          # bedrock_role_arn is required if any model routes to a Bedrock path.
          needs_role = bool(generic or harness or codex
                            or any(e["provider"] == "anthropic-bedrock" for e in anthropic))
          if needs_role and not role:
              print("::error::one or more model_id values require bedrock_role_arn input", file=sys.stderr)
              sys.exit(1)

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"anthropic={json.dumps(anthropic)}\n")
              f.write(f"generic={json.dumps(generic)}\n")
              f.write(f"harness={json.dumps(harness)}\n")
              f.write(f"codex={json.dumps(codex)}\n")

          print("Routing:",
                "anthropic", anthropic, "| generic", generic,
                "| harness", harness, "| codex", codex)
          PY

  claude-anthropic:
    needs: route
    # One run per anthropic model (anthropic-api and/or anthropic-bedrock). Skipped when none.
    if: needs.route.outputs.anthropic != '[]'
    strategy:
      fail-fast: false
      matrix:
        entry: ${{ fromJSON(needs.route.outputs.anthropic) }}
    uses: ./.github/workflows/claude-executor.yml
    with:
      trigger_mode: ${{ inputs.trigger_mode }}
      prompt: ${{ inputs.prompt }}
      claude_args: ${{ inputs.claude_args }}
      timeout_minutes: ${{ inputs.timeout_minutes }}
      runner: ${{ inputs.runner }}
      provider: ${{ matrix.entry.provider }}
      model_id: ${{ matrix.entry.model_id }}
      bedrock_role_arn: ${{ inputs.bedrock_role_arn }}
      aws_region: ${{ inputs.aws_region }}
      use_sticky_comment: ${{ inputs.use_sticky_comment }}
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

  bedrock-generic:
    needs: route
    if: needs.route.outputs.generic != '[]'
    strategy:
      fail-fast: false
      matrix:
        model_id: ${{ fromJSON(needs.route.outputs.generic) }}
    uses: ./.github/workflows/bedrock-generic-executor.yml
    with:
      model_id: ${{ matrix.model_id }}
      bedrock_role_arn: ${{ inputs.bedrock_role_arn }}
      aws_region: ${{ inputs.aws_region }}
      prompt: ${{ inputs.prompt }}
      sticky_namespace: ${{ inputs.sticky_namespace }}
      use_sticky_comment: ${{ inputs.use_sticky_comment }}
      max_output_tokens: ${{ inputs.max_output_tokens }}
      timeout_minutes: ${{ inputs.timeout_minutes }}
      runner: ${{ inputs.runner }}

  bedrock-harness:
    needs: route
    if: needs.route.outputs.harness != '[]'
    strategy:
      fail-fast: false
      matrix:
        model_id: ${{ fromJSON(needs.route.outputs.harness) }}
    uses: ./.github/workflows/bedrock-harness-executor.yml
    with:
      model_id: ${{ matrix.model_id }}
      bedrock_role_arn: ${{ inputs.bedrock_role_arn }}
      aws_region: ${{ inputs.aws_region }}
      prompt: ${{ inputs.prompt }}
      sticky_namespace: ${{ inputs.sticky_namespace }}
      use_sticky_comment: ${{ inputs.use_sticky_comment }}
      max_output_tokens: ${{ inputs.max_output_tokens }}
      block_severities: ${{ inputs.block_severities }}
      model_prices: ${{ inputs.model_prices }}
      timeout_minutes: ${{ inputs.timeout_minutes }}
      runner: ${{ inputs.runner }}

  codex-mantle:
    needs: route
    if: needs.route.outputs.codex != '[]'
    strategy:
      fail-fast: false
      matrix:
        model_id: ${{ fromJSON(needs.route.outputs.codex) }}
    uses: ./.github/workflows/codex-executor.yml
    with:
      model_id: ${{ matrix.model_id }}
      bedrock_role_arn: ${{ inputs.bedrock_role_arn }}
      # aws_region defaults to us-east-1, where GPT-5.5/5.4 are served (also us-east-2;
      # GPT-5.4 also us-west-2). Consumers only set model_id.
      aws_region: ${{ inputs.aws_region }}
      prompt: ${{ inputs.prompt }}
      sticky_namespace: ${{ inputs.sticky_namespace }}
      use_sticky_comment: ${{ inputs.use_sticky_comment }}
      reasoning_effort: ${{ inputs.reasoning_effort }}
      max_output_tokens: ${{ inputs.max_output_tokens }}
      model_prices: ${{ inputs.model_prices }}
      timeout_minutes: ${{ inputs.timeout_minutes }}
      runner: ${{ inputs.runner }}
