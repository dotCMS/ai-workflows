---
# TEMPORARY dogfood: run THIS branch's agentic harness directly on this PR, then delete.
# Calls the executor via local ./ (proven path) — avoids the nested orchestrator startup quirk.
name: Dogfood Agentic (temp)

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  agentic:
    uses: ./.github/workflows/bedrock-harness-executor.yml
    with:
      model_id: qwen.qwen3-next-80b-a3b
      bedrock_role_arn: ${{ vars.BEDROCK_ROLE_ARN }}
      prompt: ${{ vars.AI_REVIEWER_PROMPT }}
      sticky_namespace: dogfood-agentic
      use_sticky_comment: false
      block_severities: none
